<div class="tw-flex tw-flex-col tw-items-center tw-w-full">
  <div class="movie-card tw-relative tw-rounded-[12px] tw-overflow-hidden tw-cursor-pointer tw-w-full">
    <img
      [src]="movie.imageLandscape"
      [alt]="movie.name"
      class="tw-block tw-rounded-[12px] tw-transition-all tw-duration-300 tw-ease-in-out"
    />
    <div class="overlay">
      <!-- movie-detail.component.html -->
      <div class="btn buy" (click)="goToMovieDetail(movie.id)">Mua vé</div>
      <div class="btn trailer">Trailer</div>
    </div>
    <div class="rate tw-absolute tw-bottom-[50px] tw-right-2 tw-bg-black/70 tw-text-white tw-px-2 tw-py-1 tw-rounded-md tw-font-bold tw-text-base tw-z-10 tw-flex tw-items-center tw-gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" height="14" width="15.75" viewBox="0 0 576 512">
        <path fill="#FFD43B" d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"/>
      </svg>
      {{ movie.rate }}
    </div>
    <div class="age tw-text-base tw-font-bold tw-absolute tw-bottom-2 tw-right-2 tw-bg-[#F58020] tw-text-white tw-px-2 tw-py-1 tw-rounded-md">
      T{{ movie.age }}
    </div>
  </div>
  <div class="tw-text-lg tw-font-bold tw-tracking-wide tw-mt-2 tw-text-center">
    {{ movie.name }}
  </div>
</div>
