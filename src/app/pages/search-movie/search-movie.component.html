<div class="tw-pt-10 tw-px-6 tw-max-w-screen-xl tw-mx-auto">
  <div *ngIf="movies.length === 0" class="tw-flex tw-flex-col tw-items-center tw-justify-center tw-py-16 tw-text-gray-500">
    <svg xmlns="http://www.w3.org/2000/svg" class="tw-w-12 tw-h-12 tw-mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-4.35-4.35M10 18a8 8 0 100-16 8 8 0 000 16z" />
    </svg>
    <p class="tw-text-xl tw-font-semibold">Không tìm thấy phim nào</p>
    <p class="tw-text-sm tw-text-gray-400">Hãy thử lại với từ khóa khác nhé!</p>
  </div>
  <div *ngIf="movies.length > 0" class="tw-mb-4 tw-text-lg tw-font-semibold tw-text-customDark">
    Kết quả tìm kiếm cho từ khóa: "<span class="tw-text-orange">{{ name }}</span>"
  </div>
  <div *ngIf="movies.length > 0" class="tw-grid tw-grid-cols-[repeat(auto-fill,_minmax(250px,_1fr))] tw-gap-6">
    <div *ngFor="let movie of movies">
      <div (click)="goToDetail(movie)" class="tw-cursor-pointer hover:tw-shadow-lg tw-transition tw-rounded-xl tw-bg-white">
        <app-movie-card [movie]="movie"></app-movie-card>
      </div>
    </div>
  </div>
</div>
