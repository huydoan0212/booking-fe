<body class="tw-bg-bg-light">
<!--naga-->
<nav class=" tw-bg-white tw-shadow-md tw-pt-4 tw-pb-4">
  <ul class="tw-flex tw-space-x-8 tw-justify-center">
    <li>
      <div class="tw-text-softBlue">Chọn phim / Rạp / Suất</div>
    </li>
    <li>
      <div class="tw-text-deepBlue "> Chọn ghế </div>
    </li>
    <li>
      <div class="tw-text-lightGray">Chọn thức ăn</div>
    </li>
    <li>
      <div href="" class="tw-text-lightGray">Thanh toán</div>
    </li>
    <li>
      <div href="" class="tw-text-lightGray">Xác nhận</div>
    </li>
  </ul>
</nav>
<!--progress-->
<div class="tw-w-1/2 tw-h-1 tw-bg-[#ECEEF1] tw-rounded tw-mx-auto ">
  <div class="tw-w-[310px] tw-h-full tw-bg-[#034EA2] tw-rounded-l"></div>
</div>
<div class="tw-flex tw-max-w-[1250px] tw-mx-auto tw-justify-center tw-gap-6 ">
  <div class="tw-w-2/3 tw-mt-[15px]">
    <!--time-->
    <div class="tw-bg-white tw-flex tw-items-center tw-gap-4 tw-max-w-[794px] tw-h-[84px] tw-rounded-xl">
      <div class="tw-text-bold tw-m-6"> Đổi xuất chiếu </div>
      <button
        *ngFor="let time of showtimes"
        (click)="selectTime(time)"
        class="tw-px-2 tw-py-1 tw-rounded-md tw-border tw-border-[#d3d3d3] tw-bg-white tw-text-black hover:tw-bg-[#034ea2] hover:tw-text-white transition duration-300"
      >
        {{ time }}
      </button>
    </div>
    <!--  seat-->
    <div class="tw-bg-white tw-max-w-[794px] tw-mt-[15px] tw-rounded-xl tw-p-4">
      <div *ngFor="let row of rows" class="tw-mb-4 tw-flex tw-items-center">
        <div class="tw-font-bold tw-w-6 tw-text-center">
          {{ row }}
        </div>
        <div class="tw-flex tw-gap-3 tw-flex-1 tw-justify-center">
          <div
            *ngFor="let seatNumber of seatsPerRow"
            class="tw-w-7 tw-h-6 tw-flex tw-items-center tw-justify-center
        tw-border-[1px] tw-border-lightGray tw-rounded tw-cursor-pointer
        tw-select-none tw-bg-white hover:tw-bg-orange hover:tw-text-white hover:tw-border-none "
          >
            {{ seatNumber }}
          </div>
        </div>
        <div class="tw-font-bold tw-w-6 tw-text-center">
          {{ row }}
        </div>
      </div>
      <div class="tw-text-lightGray tw-text-xl tw-text-center">Màn hình</div>
      <div class="tw-h-2 tw-bg-orange tw-w-full tw-rounded"></div>
    </div>
  </div>
  <!-- Thông tin phim -->
  <app-ticket-summary></app-ticket-summary>
</div>
</body>
