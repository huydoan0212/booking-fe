<!-- Chỉ render khi visible = true -->
<div
        *ngIf="visible"
        class="payment-overlay tw-fixed tw-inset-0 tw-bg-black tw-bg-opacity-50 tw-flex tw-items-center tw-justify-center tw-z-50"

>
<!--    (click)="onOverlayClick($event)"-->
    <div class="tw-bg-white tw-rounded-2xl tw-w-3/4 tw-max-w-lg tw-p-6 tw-relative">
        <!-- Nút Đóng -->
        <button
                class="tw-absolute tw-top-3 tw-right-3 tw-text-gray-500 hover:tw-text-gray-800 tw-font-bold tw-size-7"
                aria-label="Close"
                (click)="onCloseClick()"
        >
            &times;
        </button>

        <!-- Tiêu đề -->
        <h2 class="tw-text-xl tw-font-bold tw-mb-4">Khuyến mãi</h2>

        <!-- Nội dung modal -->
        <div class="tw-space-y-4">
            <div class="tw-flex tw-items-center tw-space-x-2">
                <input
                        type="text"
                        placeholder="Mã khuyến mãi"
                        class="tw-flex-1 tw-border tw-border-gray-300 tw-rounded tw-p-2 focus:tw-outline-none focus:tw-ring-2 focus:tw-ring-blue-400"
                />
                <button class="tw-bg-orange tw-text-white tw-rounded tw-px-4 tw-py-2 hover:tw-bg-orange-brand">
                    Áp Dụng
                </button>
            </div>
            <p class="tw-text-sm tw-text-gray-600">
                Lưu ý: Có thể áp dụng nhiều vouchers vào 1 lần thanh toán
            </p>
            <div class="tw-flex tw-items-center tw-space-x-2">
                <input
                        type="radio"
                        name="paymentMethod"
                        id="vnpayOption"
                        class="tw-w-4 tw-h-4 tw-text-blue-600"
                />
                <label for="vnpayOption" class="tw-flex tw-items-center tw-space-x-2">
                    <img
                            src="https://cdn.galaxycine.vn/media/2021/12/2/download_1638460623615.png"
                            alt="VNPay"
                            class="tw-w-12 tw-h-auto"
                    />
                    <span class="tw-text-md">Thanh toán VNPay</span>
                </label>
            </div>
            <div class="tw-text-right">
                <button
                        class="tw-bg-orange tw-text-white tw-px-6 tw-py-2 tw-rounded hover:tw-bg-orange-brand"
                        (click)="onConfirmClick()"
                >
                    Xác nhận
                </button>
            </div>
        </div>
    </div>
</div>
