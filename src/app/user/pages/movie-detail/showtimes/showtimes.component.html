<div class="tw-flex tw-flex-col lg:tw-flex-row tw-items-start lg:tw-items-center tw-gap-4">
  <!-- Date picker container -->
  <div class="tw-flex tw-items-center tw-gap-2 tw-w-full">
    <!-- Left button -->
    <button class="tw-p-2 tw-rounded-full hover:tw-bg-gray-100" (click)="scrollLeft()">
      <!-- (icon như cũ) -->
    </button>

    <!-- Dates list (scrollable) -->
    <div
      #dayList
      class="tw-flex tw-gap-2 tw-overflow-x-auto tw-scroll-smooth tw-scrollbar-hide tw-w-full tw-max-w-[520px] tw-py-2"
    >
      <div
        *ngFor="let day of days"
        (click)="selectDay(day)"
        class="tw-flex tw-flex-col tw-items-center tw-min-w-[95px] tw-px-4 tw-py-2 tw-rounded-md tw-cursor-pointer tw-transition-colors hover:tw-bg-gray-100"
        [class.tw-bg-[#034ea2]]="day.isSelected"
        [class.tw-text-white]="day.isSelected"
      >
        <div class="tw-text-sm tw-font-medium">
          {{ day.weekday }}
        </div>
        <div class="tw-text-base tw-mt-1">
          {{ day.date | date:'dd/MM' }}
        </div>
      </div>
    </div>

    <!-- Right button -->
    <button class="tw-p-2 tw-rounded-full hover:tw-bg-gray-100" (click)="scrollRight()">
      <!-- (icon như cũ) -->
    </button>
  </div>

  <!-- Dropdowns -->
  <div class="tw-flex tw-gap-2 tw-w-full lg:tw-w-auto tw-mt-4">
    <!--    <select-->
    <!--      [(ngModel)]="selectedRegion"-->
    <!--      (ngModelChange)="onRegionChange($event)"-->
    <!--      class="tw-border tw-rounded-md tw-border-[#d3d3d3] tw-px-3 tw-py-2 tw-text-gray-700 tw-w-full lg:tw-w-auto tw-cursor-pointer"-->
    <!--    >-->
    <!--      <option *ngFor="let r of regions" [value]="r">{{ r }}</option>-->
    <!--    </select>-->

    <select
      [(ngModel)]="selectedCinema"
      (ngModelChange)="onCinemaChange($event)"
      class="tw-border tw-rounded-md tw-border-[#d3d3d3] tw-px-3 tw-py-2 tw-text-gray-700 tw-w-full lg:tw-w-auto tw-cursor-pointer"
    >
      <option *ngFor="let c of cinemas" [value]="c">{{ c }}</option>
    </select>
  </div>
</div>

<!-- Showtimes chỉ dùng selectedDay -->
<!-- Showtimes cho selectedDay -->
<div class="tw-pt-30px" *ngIf="selectedDay">
  <ng-container *ngIf="cinemas.length; else noCinemas">

    <!-- Nếu chọn 'Tất cả rạp', lặp từ phần tử thứ nhất trở đi -->
    <ng-container *ngFor="let cinemaName of
         (selectedCinema === 'Tất cả rạp'
            ? cinemas.slice(1)
            : [selectedCinema]
         )">

      <div class="tw-mb-6">
        <h2 class="tw-text-xl tw-pb-2 tw-font-bold">{{ cinemaName }}</h2>

        <ng-container *ngIf="getShowtimesForCinema(cinemaName).length; else noShow">
          <div class="tw-flex tw-items-center tw-space-x-6">
            <button
              *ngFor="let show of getShowtimesForCinema(cinemaName)"
              (click)="selectTime(show); goToBooking(show.id)"
              class="tw-px-4 tw-py-2 tw-rounded-md tw-border tw-border-[#d3d3d3] tw-bg-white tw-text-black hover:tw-bg-[#034ea2] hover:tw-text-white transition duration-300"
            >
              {{ show.time }}
              <span class="tw-text-xs tw-block">
                {{ show.screenFormat }} / {{ show.subtitle }}
              </span>
            </button>
          </div>
        </ng-container>

        <ng-template #noShow>
          <p class="tw-text-gray-500">
            Không có suất chiếu cho {{ cinemaName }}.
          </p>
        </ng-template>
      </div>

    </ng-container>

  </ng-container>

  <ng-template #noCinemas>
    <p class="tw-text-gray-500">Không có showtime nào.</p>
  </ng-template>
</div>
